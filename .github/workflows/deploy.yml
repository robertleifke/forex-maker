name: CI / Deploy

# Tests run on GitHub-hosted runners for every PR and push to main.
# Deployment runs ONLY when a release tag (v*) is pushed — never on a plain
# merge to main — so shipping to prod is always a deliberate, reviewable step.
# The deploy job is gated behind the `production` environment; add a required
# reviewer to that environment so each release deploy needs a manual approval.

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run mypy
        run: docker build --target typecheck .

      - name: Run tests
        run: docker build --target test .

  deploy:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: self-hosted
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          push: true
          tags: |
            ghcr.io/lavavc/automated-infra:latest
            ghcr.io/lavavc/automated-infra:${{ github.sha }}

      - name: Deploy
        run: |
          cp docker-compose.yml /opt/repo/docker-compose.yml
          docker compose -f /opt/repo/docker-compose.yml pull
          docker compose -f /opt/repo/docker-compose.yml up -d --remove-orphans
