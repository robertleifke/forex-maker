name: CI / Deploy

on:
  pull_request:
  push:
    branches: [main]

# Image builds run on GitHub-hosted runners (ample RAM); the self-hosted runner
# shares a 4GB box with the live engine, so building there OOM-freezes prod.
# The self-hosted runner is used ONLY for the final deploy (pull + up), which is
# cheap on memory.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run mypy
        run: docker build --target typecheck .

      - name: Run tests
        run: docker build --target test .

  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          push: true
          tags: |
            ghcr.io/lavavc/automated-infra:latest
            ghcr.io/lavavc/automated-infra:${{ github.sha }}

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        run: |
          cp docker-compose.yml /opt/repo/docker-compose.yml
          docker compose -f /opt/repo/docker-compose.yml pull
          docker compose -f /opt/repo/docker-compose.yml up -d --remove-orphans
