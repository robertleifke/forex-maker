name: CI / Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Run tests
        run: docker build --target test .

  deploy:
    needs: test
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          push: true
          tags: |
            ghcr.io/lavavc/automated-infra:latest
            ghcr.io/lavavc/automated-infra:${{ github.sha }}

      - name: Deploy
        run: |
          cp docker-compose.yml /opt/repo/docker-compose.yml
          docker compose -f /opt/repo/docker-compose.yml pull
          docker compose -f /opt/repo/docker-compose.yml up -d --remove-orphans
