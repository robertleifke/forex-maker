# Proxy the engine (HTTP + WebSocket) on the Tailscale interface.
# Install: ln -s /opt/cngn/nginx/cngn.conf /etc/nginx/sites-enabled/cngn
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name _;

    # Reject requests that aren't coming from the Tailscale interface
    # (belt-and-suspenders on top of ufw)
    allow 100.64.0.0/10;   # Tailscale CGNAT range
    deny all;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
