services:
  engine:
    image: ghcr.io/lavavc/automated-infra:latest
    restart: unless-stopped
    # Cap engine memory on the 4GB host so a runaway/leak restarts the container
    # instead of OOM-killing the whole box (which takes down every other service).
    mem_limit: 3g
    # Published on loopback for local debugging only. Public traffic reaches the
    # container over the nginx-proxy network below, not via this host port.
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      HOST: "0.0.0.0"
      # Consumed by the existing nginx-proxy + acme-companion stack to generate the
      # public vhost and Let's Encrypt certificate.
      VIRTUAL_HOST: "your-domain.com"
      VIRTUAL_PORT: "8000"
      LETSENCRYPT_HOST: "your-domain.com"
      LETSENCRYPT_EMAIL: "you@example.com"
    volumes:
      - ./data:/app/data
    networks:
      - nginx-proxy

networks:
  nginx-proxy:
    external: true
    name: serve
